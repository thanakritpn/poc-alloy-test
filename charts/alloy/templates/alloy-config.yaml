{{- if .Values.create }}
# ============================================================================
# Template: Alloy ConfigMap
# Description:
#   Builds the Alloy configuration ConfigMap by reading all per-tenant .alloy
#   files from the tenants/ directory using Files.Glob. The base config defines
#   shared receivers (Loki push on :3100, OTLP on :4317/:4318) that fan-out
#   to every tenant's loki.process and otelcol.exporter blocks.
# ============================================================================

{{- /* Build tenant ID and forward_to lists from tenant alloy files */ -}}
{{- $lokiFwds  := list -}}
{{- $traceFwds := list -}}
{{- range $path, $_ := .Files.Glob "tenants/**/*.alloy" -}}
  {{- $appId := trimSuffix ".alloy" (base $path) | replace "-" "_" -}}
  {{- $lokiFwds  = append $lokiFwds  (printf "loki.process.%s.receiver" $appId) -}}
  {{- $traceFwds = append $traceFwds (printf "otelcol.exporter.otlphttp.%s.input" $appId) -}}
{{- end }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Values.templateName }}-{{ .Values.templateVersion }}-cm-alloy-{{ .Values.environment }}
  namespace: {{ .Values.alloy.namespaceOverride | default "alloy" }}
data:
  config.alloy: |
    // =========================================================
    // BASE CONFIG — shared receivers, fan-out to all tenants
    // =========================================================

    logging {
      level  = "info"
      format = "logfmt"
    }

    prometheus.exporter.self "default" {}

    // Loki receiver: CLF → fan-out to every tenant's loki.process
    loki.source.api "default" {
      http {
        listen_address = "0.0.0.0"
        listen_port    = 3100
      }
      forward_to = [{{ join ", " $lokiFwds }}]
    }

    // OTLP receiver: apps → fan-out to every tenant's trace exporter
    otelcol.receiver.otlp "default" {
      grpc { endpoint = "0.0.0.0:4317" }
      http { endpoint = "0.0.0.0:4318" }
      output {
        traces = [{{ join ", " $traceFwds }}]
      }
    }

    // =========================================================
    // PER-TENANT CONFIGS (generated by ccp-template pipeline)
    // =========================================================
{{- range $path, $_ := .Files.Glob "tenants/**/*.alloy" }}
{{ $.Files.Get $path | indent 4 }}
{{- end }}
{{- end }}
